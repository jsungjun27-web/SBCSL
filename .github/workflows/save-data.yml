name: Save Site Data

on:
  repository_dispatch:
    types: [save-data]

jobs:
  save:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.DATA_TOKEN }}

      - name: Write data.json
        run: |
          echo '${{ toJSON(github.event.client_payload.data) }}' > data.json

      - name: Commit and push
        run: |
          git config user.name "SBCSL Bot"
          git config user.email "action@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update site data ($(date '+%Y-%m-%d %H:%M'))"
          git push
